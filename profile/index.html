<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Profile | Social Map</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; text-align: center; margin: 0; padding: 20px; }
    .card { background: white; max-width: 400px; margin: 10px auto; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    .branding { font-weight: 900; color: #d32f2f; font-size: 20px; margin-bottom: 20px; letter-spacing: 1px; }
    h2 { color: #333; font-size: 24px; margin-bottom: 5px; }
    .status-text { color: #888; font-size: 14px; margin-bottom: 25px; }
    
    .btn { display: block; width: 85%; margin: 12px auto; padding: 14px; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    
    .whatsapp { background: linear-gradient(45deg, #25D366, #128C7E); }
    .maps { background: linear-gradient(45deg, #EA4335, #D32F2F); }
    .facebook { background: linear-gradient(45deg, #1877F2, #0d5a9e); }
    .instagram { background: linear-gradient(45deg, #E4405F, #833AB4); }
    .menu { background: linear-gradient(45deg, #FF9800, #F57C00); }
    
    .footer { margin-top: 30px; font-size: 12px; color: #999; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card" id="profileCard">
    <div class="branding">🔴 SOCIAL MAP</div>
    <h2 id="businessName">Loading...</h2>
    <div class="status-text" id="statusMessage">ඔබගේ තොරතුරු ලබාගනිමින් පවතී...</div>
    
    <div id="loader" class="loader"></div>
    <div id="buttonsContainer"></div>
  </div>
  
  <div class="footer">Powered by Mapa Solutions - Social Map Unit</div>

  <script>
    // 👇 ඔයාගේ Web App URL එක හරියටම මෙතනට දාන්න 👇
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";

    // URL එකෙන් ID එක හොයාගන්නවා (උදා: ?id=101)
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if(id) {
      // Apps Script එකට කතා කරලා දත්ත ඉල්ලනවා
      fetch(`${APPS_SCRIPT_URL}?action=profile&id=${id}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('loader').style.display = 'none';
          
          if(data.error) {
            document.getElementById('businessName').innerText = "ගැටළුවක් මතු විය!";
            document.getElementById('businessName').style.color = "red";
            document.getElementById('statusMessage').innerText = data.error;
            return;
          }

          const profile = data.data;
          document.getElementById('businessName').innerText = profile.BusinessName;
          document.getElementById('statusMessage').innerText = "Welcome!";

          let buttonsHtml = '';
          
          // Sheet එකේ ලින්ක් එකක් තියෙනවා නම් විතරක් ඒ බොත්තම පෙන්වනවා
          if(profile.WhatsApp) buttonsHtml += `<a href="${profile.WhatsApp}" class="btn whatsapp">💬 WhatsApp</a>`;
          if(profile.Maps) buttonsHtml += `<a href="${profile.Maps}" class="btn maps">📍 Google Maps</a>`;
          if(profile.Facebook) buttonsHtml += `<a href="${profile.Facebook}" class="btn facebook">📘 Facebook</a>`;
          if(profile.Instagram) buttonsHtml += `<a href="${profile.Instagram}" class="btn instagram">📸 Instagram</a>`;
          if(profile.MenuPDF) buttonsHtml += `<a href="${profile.MenuPDF}" class="btn menu">📄 Menu PDF</a>`;

          document.getElementById('buttonsContainer').innerHTML = buttonsHtml;
        })
        .catch(err => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('businessName').innerText = "System Error!";
          document.getElementById('statusMessage').innerText = "අන්තර්ජාල සම්බන්ධතාවය පරීක්ෂා කරන්න.";
        });
    } else {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('businessName').innerText = "Invalid QR";
      document.getElementById('statusMessage').innerText = "කරුණාකර නිවැරදි QR කේතය ස්කෑන් කරන්න.";
    }
  </script>
</body>
</html>
