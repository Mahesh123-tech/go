<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <title>Smart Profile</title>
  <style>
    body { font-family: sans-serif; background: #f9f9f9; margin: 0; padding: 0; display: flex; justify-content: center; }
    .profile-container { background: white; width: 100%; max-width: 400px; min-height: 100vh; display: flex; flex-direction: column; }
    .theme-banner { height: 120px; background: #d32f2f; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px;}
    .profile-img-placeholder { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: -40px; border: 4px solid white; }
    .info-section { text-align: center; padding: 50px 20px 20px 20px; }
    .links-section { padding: 0 20px 30px 20px; display: flex; flex-direction: column; gap: 15px; }
    .btn { display: none; width: 100%; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 16px; text-align: center; color: white; border: none; cursor: pointer; }
    .btn-wa { background: #25D366; } .btn-maps { background: #EA4335; } .btn-fb { background: #1877F2; } .btn-ig { background: #E4405F; } .btn-web { background: #333333; } .btn-email { background: #FBBC05; color: #333; } .btn-menu { background: #673AB7; } 
    .btn-loyalty { background: #ff9800; animation: pulse 2s infinite;}
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); } }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    .modal-content { width: 90%; max-width: 350px; background: white; border-radius: 15px; padding: 20px; text-align: center; position: relative; max-height: 90vh; overflow-y: auto;}
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; border: none; background: none;}
    .loyalty-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: center;}
    .loyalty-btn { background: #d32f2f; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px;}
    .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
    .stamp-circle { width: 45px; height: 45px; border-radius: 50%; background: #eee; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; font-size: 20px; margin: 0 auto;}
    .stamp-filled { background: #ff9800; border: 2px solid #e68a00; color: white; }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="theme-banner" id="themeBanner"><div class="profile-img-placeholder" id="profileIcon">🏢</div></div>
    <div class="info-section"><h1 id="bName">Loading...</h1></div>
    <div class="links-section">
      <button class="btn btn-loyalty" id="btnLoyalty" onclick="openModal('viewLogin')">🎁 My Loyalty Card</button>
      <a href="#" id="btnWa" class="btn btn-wa">💬 WhatsApp</a> <a href="#" id="btnMaps" class="btn btn-maps">📍 Google Maps</a>
      <a href="#" id="btnFb" class="btn btn-fb">📘 Facebook</a> <a href="#" id="btnIg" class="btn btn-ig">📸 Instagram</a>
      <a href="#" id="btnWeb" class="btn btn-web">🌐 Website</a> <a href="#" id="btnEmail" class="btn btn-email">✉️ Email Us</a>
    </div>
  </div>

  <div id="loyaltyModal" class="modal">
    <div class="modal-content" id="viewLogin" style="display:none;">
      <button class="close-btn" onclick="document.getElementById('loyaltyModal').style.display='none'">&times;</button>
      <h2>🎁 My Stamps</h2>
      <input type="tel" id="lPhone" class="loyalty-input" placeholder="Phone (07XXXXXXXX)">
      <input type="password" id="lPin" class="loyalty-input" placeholder="4-Digit PIN">
      <button class="loyalty-btn" onclick="checkLoyalty()">බලන්න</button>
      <p style="color:#d32f2f; text-decoration:underline; cursor:pointer;" onclick="switchView('viewSetup')">ගිණුමක් නැද්ද? Register වන්න</p>
      <p id="msgLogin" style="color:red; font-weight:bold; display:none;"></p>
    </div>

    <div class="modal-content" id="viewSetup" style="display:none;">
      <button class="close-btn" onclick="document.getElementById('loyaltyModal').style.display='none'">&times;</button>
      <h2>🛡️ ආරක්ෂිත ගිණුම</h2>
      <input type="tel" id="sPhone" class="loyalty-input" placeholder="Phone (07XXXXXXXX)">
      <input type="number" id="sPin" class="loyalty-input" placeholder="New 4-Digit PIN">
      <input type="number" id="sYear" class="loyalty-input" placeholder="Birth Year (1995)">
      <button class="loyalty-btn" onclick="setupLoyalty()">සුරකින්න (Save)</button>
      <p id="msgSetup" style="color:red; font-weight:bold; display:none;"></p>
    </div>

    <div class="modal-content" id="viewCard" style="display:none;">
      <button class="close-btn" onclick="document.getElementById('loyaltyModal').style.display='none'">&times;</button>
      <h2 style="color:#d32f2f;">🎁 Loyalty Card</h2>
      <p id="stampText" style="font-weight:bold;"></p>
      <div class="stamp-grid" id="stampGrid"></div>
      <p id="targetMsg" style="font-size:13px; color:#555;"></p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";
    let currentShopId = new URLSearchParams(window.location.search).get('id');
    let globalStampTarget = 10;

    window.onload = function() {
      if(currentShopId) {
        fetch(`${APPS_SCRIPT_URL}?action=profile&id=${currentShopId}`).then(res=>res.json()).then(data => {
          if(data.success) {
            const p = data.data;
            document.getElementById('bName').innerText = p.BusinessName;
            if(p.ThemeColor) document.getElementById('themeBanner').style.backgroundColor = p.ThemeColor;
            document.getElementById('profileIcon').innerText = p.BusinessName.charAt(0).toUpperCase();

            if(p.WhatsApp) { document.getElementById('btnWa').href=p.WhatsApp; document.getElementById('btnWa').style.display="block"; }
            if(p.Facebook) { document.getElementById('btnFb').href=p.Facebook; document.getElementById('btnFb').style.display="block"; }
            
            // Show Loyalty Button ONLY IF Active
            if(p.LoyaltyStatus === "Active") {
              document.getElementById('btnLoyalty').style.display = "block";
              globalStampTarget = parseInt(p.StampTarget) || 10;
            }
          }
        });
      }
    };

    function openModal(viewId) { document.getElementById('loyaltyModal').style.display="flex"; switchView(viewId); }
    function switchView(viewId) {
      document.getElementById('viewLogin').style.display="none"; document.getElementById('viewSetup').style.display="none"; document.getElementById('viewCard').style.display="none";
      document.getElementById(viewId).style.display="block";
    }
    function showMsg(id, text, color="red") { let e=document.getElementById(id); e.innerText=text; e.style.color=color; e.style.display="block"; }

    function checkLoyalty() {
      fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'loyaltyGet', shopId:currentShopId, phone:document.getElementById('lPhone').value, pin:document.getElementById('lPin').value})})
      .then(res=>res.json()).then(data => {
        if(data.success) {
          if(data.requiresSetup) switchView('viewSetup');
          else { drawStampCard(data.stamps); switchView('viewCard'); }
        } else showMsg('msgLogin', data.error);
      });
    }

    function setupLoyalty() {
      fetch(APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'loyaltySetup', shopId:currentShopId, phone:document.getElementById('sPhone').value, pin:document.getElementById('sPin').value, birthYear:document.getElementById('sYear').value})})
      .then(res=>res.json()).then(data => {
        if(data.success) { showMsg('msgLogin', "ගිණුම හැදුවා! ලොග් වෙන්න.", "green"); switchView('viewLogin'); } else showMsg('msgSetup', data.error);
      });
    }

    function drawStampCard(stamps) {
      document.getElementById('stampText').innerText = `ඔබට මුද්දර ${stamps} ක් ඇත!`;
      const grid = document.getElementById('stampGrid'); grid.innerHTML = "";
      for(let i=1; i<=globalStampTarget; i++) {
        if(i <= stamps) grid.innerHTML += `<div class="stamp-circle stamp-filled">🎁</div>`;
        else grid.innerHTML += `<div class="stamp-circle">${i}</div>`;
      }
      document.getElementById('targetMsg').innerText = `මුද්දර ${globalStampTarget}ක් එකතු කර නොමිලේ තෑග්ගක් ලබාගන්න!`;
    }
  </script>
</body>
</html>
