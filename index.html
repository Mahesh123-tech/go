<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body>
<p>Redirecting...</p>
<script>
  var id = new URLSearchParams(window.location.search).get('id');
  var scriptURL = "https://script.google.com/macros/s/AKfycbx8rSWEKcAF8O7qM7r2NwwKamvxxrFQknokMq2Z_w0z9BMHunyHeMabmmdcRS1bWWS2/exec";
  
  fetch(scriptURL + "?id=" + id)
    .then(function(r){ return r.text(); })
    .then(function(url){ window.location.href = url; });
</script>
</body>
</html>
