<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Social Map</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; margin: 0; padding: 0; }
    .header { background: #d32f2f; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header h2 { margin: 0; font-size: 20px; font-weight: 900; }
    .user-info { font-size: 14px; font-weight: bold; }
    .logout-btn { background: #fff; color: #d32f2f; border: none; padding: 6px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .form-section { flex: 1; min-width: 350px; }
    .table-section { flex: 2; min-width: 400px; }
    
    h3 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; font-size: 13px; color: #555; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .btn-save { background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; font-size: 15px; }
    .msg { padding: 10px; margin-bottom: 15px; display: none; border-radius: 5px; text-align: center; font-weight: bold;}
    
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    table th, table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    table th { background-color: #f8f9fa; }
    .btn-edit { background: #1976d2; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .scan-badge { background: #ff9800; color: white; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <h2>🔴 SOCIAL MAP ADMIN</h2>
    <div class="user-info">
      <span id="staffNameDisplay">Loading...</span> | 
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- පාරිභෝගිකයින් ඇතුළත් කරන ෆෝම් එක (Left Side) -->
    <div class="card form-section">
      <h3>පාරිභෝගික තොරතුරු [Admin Control]</h3>
      <div id="msg" class="msg"></div>

      <div class="grid-2">
        <div class="form-group"><label>ID</label><input type="text" id="c_id"></div>
        <div class="form-group"><label>Type</label>
          <select id="c_type"><option value="profile">Profile</option><option value="redirect">Redirect</option></select>
        </div>
      </div>
      <div class="form-group"><label>Business Name</label><input type="text" id="c_name"></div>

      <div class="grid-2">
        <div class="form-group"><label>WhatsApp</label><input type="text" id="c_wa"></div>
        <div class="form-group"><label>Maps</label><input type="text" id="c_maps"></div>
        <div class="form-group"><label>Facebook</label><input type="text" id="c_fb"></div>
        <div class="form-group"><label>Instagram</label><input type="text" id="c_ig"></div>
        <div class="form-group"><label>Website</label><input type="text" id="c_web"></div>
        <div class="form-group"><label>Email</label><input type="text" id="c_email"></div>
      </div>
      <div class="form-group"><label>Menu PDF (Drive Link)</label><input type="text" id="c_menu"></div>

      <div class="grid-2">
        <div class="form-group"><label>Theme Color (Hex)</label><input type="text" id="c_theme" placeholder="#FFFFFF"></div>
        <div class="form-group"><label>Package</label><input type="text" id="c_package" placeholder="e.g. Premium"></div>
        <div class="form-group"><label>Expiry Date</label><input type="date" id="c_expiry"></div>
        <div class="form-group"><label>Status</label>
          <select id="c_status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
        </div>
      </div>

      <button class="btn-save" onclick="saveData()" id="saveBtn">Save Data (සුරකින්න)</button>
    </div>

    <!-- පාරිභෝගික ලැයිස්තුව සහ Scan ගණන (Right Side) -->
    <div class="card table-section">
      <h3>පාරිභෝගික ලැයිස්තුව [Customer List & Scans]</h3>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Scans</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5">Loading data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 👇 ඔයාගේ Web App URL එක හරියටම මෙතනට දාන්න 👇
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";

    const staffName = sessionStorage.getItem('loggedInStaff');
    const staffId = sessionStorage.getItem('loggedInStaffId');
    
    if(!staffName || !staffId) {
      window.location.href = "index.html"; 
    } else {
      document.getElementById('staffNameDisplay').innerText = "Staff: " + staffName;
      loadCustomers(); 
    }

    function loadCustomers() {
      fetch(`${APPS_SCRIPT_URL}?action=getAll`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('tableBody');
          tbody.innerHTML = "";
          
          if(data.success && data.data.length > 0) {
            data.data.forEach(cust => {
              // දත්ත ආරක්ෂිතව පාස් කිරීම
              const safeStr = (str) => (str || '').toString().replace(/'/g, "\\'");
              
              const btnHtml = `<button class="btn-edit" onclick="editCustomer('${safeStr(cust.ID)}', '${safeStr(cust.BusinessName)}', '${safeStr(cust.Type)}', '${safeStr(cust.WhatsApp)}', '${safeStr(cust.Maps)}', '${safeStr(cust.Facebook)}', '${safeStr(cust.Instagram)}', '${safeStr(cust.Website)}', '${safeStr(cust.Email)}', '${safeStr(cust.MenuPDF)}', '${safeStr(cust.ThemeColor)}', '${safeStr(cust.Package)}', '${safeStr(cust.ExpiryDate)}', '${safeStr(cust.Status)}')">Edit</button>`;

              const row = `<tr>
                <td><b>${cust.ID}</b></td>
                <td>${cust.BusinessName}<br><small style="color:gray">${cust.Package || ''}</small></td>
                <td><span class="scan-badge">${cust.ScanCount || 0}</span></td>
                <td><span style="color:${cust.Status==='Active'?'green':'red'}">${cust.Status}</span></td>
                <td>${btnHtml}</td>
              </tr>`;
              tbody.innerHTML += row;
            });
          } else {
            tbody.innerHTML = "<tr><td colspan='5'>දැනට පාරිභෝගිකයින් කිසිවෙකු නොමැත.</td></tr>";
          }
        })
        .catch(err => console.log(err));
    }

    function saveData() {
      const btn = document.getElementById('saveBtn');
      const payload = {
        action: "saveCustomer",
        staffId: staffId,
        staffName: staffName,
        customerData: {
          ID: document.getElementById('c_id').value,
          Type: document.getElementById('c_type').value,
          BusinessName: document.getElementById('c_name').value,
          WhatsApp: document.getElementById('c_wa').value,
          Maps: document.getElementById('c_maps').value,
          Facebook: document.getElementById('c_fb').value,
          Instagram: document.getElementById('c_ig').value,
          Website: document.getElementById('c_web').value,
          Email: document.getElementById('c_email').value,
          MenuPDF: document.getElementById('c_menu').value,
          ThemeColor: document.getElementById('c_theme').value,
          Package: document.getElementById('c_package').value,
          ExpiryDate: document.getElementById('c_expiry').value,
          Status: document.getElementById('c_status').value
        }
      };

      const msg = document.getElementById('msg');
      btn.innerText = "Saving...";
      btn.disabled = true;

      fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
          btn.innerText = "Save Data (සුරකින්න)";
          btn.disabled = false;
          msg.style.display = 'block';
          msg.style.background = data.success ? '#d4edda' : '#f8d7da';
          msg.style.color = data.success ? '#155724' : '#721c24';
          msg.innerText = data.success ? data.message : data.error;
          
          if(data.success) {
              loadCustomers(); // වගුව අලුත් කිරීම
          }
        });
    }

    function editCustomer(id, name, type, wa, maps, fb, ig, web, email, menu, theme, pkg, expiry, status) {
      document.getElementById('c_id').value = id;
      document.getElementById('c_name').value = name;
      document.getElementById('c_type').value = type;
      document.getElementById('c_wa').value = wa;
      document.getElementById('c_maps').value = maps;
      document.getElementById('c_fb').value = fb;
      document.getElementById('c_ig').value = ig;
      document.getElementById('c_web').value = web;
      document.getElementById('c_email').value = email;
      document.getElementById('c_menu').value = menu;
      document.getElementById('c_theme').value = theme;
      document.getElementById('c_package').value = pkg;
      
      let formattedDate = "";
      if(expiry && expiry !== "undefined") {
          try { formattedDate = new Date(expiry).toISOString().split('T')[0]; } 
          catch(e) { formattedDate = expiry.substring(0, 10); }
      }
      document.getElementById('c_expiry').value = formattedDate;
      document.getElementById('c_status').value = status;
      window.scrollTo(0, 0); 
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
