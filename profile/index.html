<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Profile | Social Map</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
    .profile-container { background: white; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.05); min-height: 100vh; position: relative; display: flex; flex-direction: column; }
    
    /* Dynamic Theme Banner */
    .theme-banner { height: 120px; background-color: #d32f2f; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; transition: background-color 0.5s;}
    .profile-img-placeholder { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: -40px; border: 4px solid white; }
    
    .info-section { text-align: center; padding: 50px 20px 20px 20px; }
    h1 { margin: 0; font-size: 24px; color: #333; }
    p { color: #777; font-size: 14px; margin-top: 5px; }

    .links-section { padding: 0 20px 30px 20px; display: flex; flex-direction: column; gap: 15px; }
    
    /* Button Styles */
    .btn { display: none; width: 100%; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 16px; text-align: center; color: white; box-sizing: border-box; transition: transform 0.2s, box-shadow 0.2s; border: none; cursor: pointer; }
    .btn:active { transform: scale(0.98); }
    
    .btn-wa { background: #25D366; }
    .btn-maps { background: #EA4335; }
    .btn-fb { background: #1877F2; }
    .btn-ig { background: #E4405F; }
    .btn-web { background: #333333; }
    .btn-email { background: #FBBC05; color: #333; }
    .btn-menu { background: #673AB7; }

    /* Footer */
    .footer { margin-top: auto; padding: 20px; text-align: center; font-size: 12px; color: #aaa; }

    /* Loading Screen */
    #loader { position: absolute; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index: 100; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Modal for Menu PDF Viewer */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { width: 95%; height: 85%; background: white; border-radius: 10px; overflow: hidden; position: relative; }
    .modal iframe { width: 100%; height: 100%; border: none; }
    .close-btn { position: absolute; bottom: 20px; padding: 12px 30px; background: #EA4335; color: white; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1001; }
  </style>
</head>
<body>

  <div class="profile-container">
    
    <!-- Loading Screen -->
    <div id="loader">
      <div class="spinner"></div>
      <p style="margin-top:15px; font-weight:bold;">Loading Profile...</p>
    </div>

    <!-- Header Section -->
    <div class="theme-banner" id="themeBanner">
      <div class="profile-img-placeholder" id="profileIcon">🏢</div>
    </div>

    <!-- Info Section -->
    <div class="info-section">
      <h1 id="bName">Business Name</h1>
      <p>Welcome to our Smart Profile</p>
    </div>

    <!-- Buttons Section -->
    <div class="links-section">
      <a href="#" id="btnWa" target="_blank" class="btn btn-wa">💬 WhatsApp</a>
      <a href="#" id="btnMaps" target="_blank" class="btn btn-maps">📍 Google Maps</a>
      <a href="#" id="btnFb" target="_blank" class="btn btn-fb">📘 Facebook</a>
      <a href="#" id="btnIg" target="_blank" class="btn btn-ig">📸 Instagram</a>
      <a href="#" id="btnWeb" target="_blank" class="btn btn-web">🌐 Website</a>
      <a href="#" id="btnEmail" class="btn btn-email">✉️ Email Us</a>
      
      <!-- Menu Button triggers the internal viewer -->
      <button id="btnMenu" class="btn btn-menu" onclick="openMenu()">📄 View Menu</button>
    </div>

    <div class="footer">
      Powered by Mapa Solutions - Social Map
    </div>

  </div>

  <!-- Menu PDF Viewer Modal -->
  <div id="menuModal" class="modal">
    <div class="modal-content">
      <iframe id="menuIframe" src=""></iframe>
    </div>
    <button class="close-btn" onclick="closeMenu()">Close Menu ✖</button>
  </div>

  <script>
    // 👇 ඔයාගේ Web App URL එක හරියටම මෙතනට දාන්න 👇
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";

    let menuPdfLink = "";

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      if(id) {
        fetch(`${APPS_SCRIPT_URL}?action=profile&id=${id}`)
          .then(res => res.json())
          .then(data => {
            document.getElementById('loader').style.display = 'none';

            if(data.success) {
              const p = data.data;

              // Set Business Name
              document.getElementById('bName').innerText = p.BusinessName;
              
              // Set Theme Color (If available)
              if(p.ThemeColor && p.ThemeColor.trim() !== "") {
                document.getElementById('themeBanner').style.backgroundColor = p.ThemeColor;
              }

              // Set Icon Letter (First letter of business)
              document.getElementById('profileIcon').innerText = p.BusinessName.charAt(0).toUpperCase();

              // Setup Buttons (Show only if data exists)
              setupButton('btnWa', p.WhatsApp);
              setupButton('btnMaps', p.Maps);
              setupButton('btnFb', p.Facebook);
              setupButton('btnIg', p.Instagram);
              setupButton('btnWeb', p.Website);

              if (p.Email) {
                document.getElementById('btnEmail').href = "mailto:" + p.Email;
                document.getElementById('btnEmail').style.display = "block";
              }

              if (p.MenuPDF) {
                menuPdfLink = p.MenuPDF;
                document.getElementById('btnMenu').style.display = "block";
              }

            } else {
              document.getElementById('bName').innerText = "Profile Not Found";
              document.getElementById('bName').style.color = "red";
            }
          })
          .catch(err => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('bName').innerText = "Connection Error";
          });
      } else {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('bName').innerText = "Invalid Link";
      }
    };

    function setupButton(btnId, link) {
      if(link && link.trim() !== "" && link !== "undefined") {
        document.getElementById(btnId).href = link;
        document.getElementById(btnId).style.display = "block";
      }
    }

    // --- Internal PDF Viewer Logic ---
    function openMenu() {
      let finalUrl = menuPdfLink;
      
      // Convert Google Drive view link to preview link for embedding
      if(finalUrl.includes("drive.google.com") && finalUrl.includes("/view")) {
        finalUrl = finalUrl.replace(/\/view.*$/, "/preview");
      }
      
      document.getElementById('menuIframe').src = finalUrl;
      document.getElementById('menuModal').style.display = "flex";
    }

    function closeMenu() {
      document.getElementById('menuModal').style.display = "none";
      document.getElementById('menuIframe').src = ""; // Stop loading when closed
    }
  </script>
</body>
</html>
