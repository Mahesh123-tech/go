<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Social Map</title>
  <style>
    /* ... (Basic styling) ... */
    body { font-family: sans-serif; background: #f4f6f8; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { background: #d32f2f; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
    .msg { padding: 10px; margin-bottom: 10px; display: none; border-radius: 5px; text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <h2>පාරිභෝගික තොරතුරු [Admin Control]</h2>
  <div id="msg" class="msg"></div>

  <div class="grid-2">
    <div class="form-group"><label>ID</label><input type="text" id="c_id"></div>
    <div class="form-group"><label>Type</label>
      <select id="c_type"><option value="profile">Profile</option><option value="redirect">Redirect</option></select>
    </div>
  </div>

  <div class="form-group"><label>Business Name</label><input type="text" id="c_name"></div>

  <hr><h3>Links & Contacts</h3>
  <div class="grid-2">
    <div class="form-group"><label>WhatsApp</label><input type="text" id="c_wa"></div>
    <div class="form-group"><label>Maps</label><input type="text" id="c_maps"></div>
    <div class="form-group"><label>Facebook</label><input type="text" id="c_fb"></div>
    <div class="form-group"><label>Instagram</label><input type="text" id="c_ig"></div>
    <div class="form-group"><label>Website (අලුත්)</label><input type="text" id="c_web"></div>
    <div class="form-group"><label>Email (අලුත්)</label><input type="text" id="c_email"></div>
  </div>
  <div class="form-group"><label>Menu PDF (Drive Link)</label><input type="text" id="c_menu"></div>

  <hr><h3>Account Settings</h3>
  <div class="grid-2">
    <div class="form-group"><label>Theme Color (Hex)</label><input type="text" id="c_theme" placeholder="#FFFFFF"></div>
    <div class="form-group"><label>Package</label><input type="text" id="c_package" placeholder="e.g. Premium"></div>
    <div class="form-group"><label>Expiry Date</label><input type="date" id="c_expiry"></div>
    <div class="form-group"><label>Status</label>
      <select id="c_status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
    </div>
  </div>

  <button class="btn" onclick="saveData()">Save Data (සුරකින්න)</button>
</div>

<script>
  // 👇 ඔයාගේ Web App URL එක මෙතනට දාන්න 👇
  const APPS_SCRIPT_URL = "මhttps://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";

  function saveData() {
    const payload = {
      action: "saveCustomer",
      customerData: {
        ID: document.getElementById('c_id').value,
        Type: document.getElementById('c_type').value,
        BusinessName: document.getElementById('c_name').value,
        WhatsApp: document.getElementById('c_wa').value,
        Maps: document.getElementById('c_maps').value,
        Facebook: document.getElementById('c_fb').value,
        Instagram: document.getElementById('c_ig').value,
        Website: document.getElementById('c_web').value,     // අලුත් එක
        Email: document.getElementById('c_email').value,       // අලුත් එක
        MenuPDF: document.getElementById('c_menu').value,
        ThemeColor: document.getElementById('c_theme').value,  // ඔයාගේ Sheet එකේ තිබුණ එක
        ExpiryDate: document.getElementById('c_expiry').value, // ඔයාගේ Sheet එකේ තිබුණ එක
        Package: document.getElementById('c_package').value,   // ඔයාගේ Sheet එකේ තිබුණ එක
        Status: document.getElementById('c_status').value
      }
    };

    const msg = document.getElementById('msg');
    msg.style.display = 'block'; msg.innerText = 'Saving...';

    fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(data => {
        msg.style.background = data.success ? '#d4edda' : '#f8d7da';
        msg.style.color = data.success ? '#155724' : '#721c24';
        msg.innerText = data.success ? data.message : data.error;
      });
  }
</script>
</body>
</html>
